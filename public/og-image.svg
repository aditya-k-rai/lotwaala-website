<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#grad1)"/>

  <!-- Logo/Brand area -->
  <circle cx="100" cy="80" r="45" fill="white" opacity="0.2"/>
  <text x="160" y="100" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">
    Lotwaala
  </text>

  <!-- Main heading -->
  <text x="60" y="220" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" width="1080">
