  </text>
  <text x="750" y="250" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.8)">
    12,400+ Reviews
  </text>

  <text x="750" y="350" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white">
    100K+
  </text>
  <text x="750" y="390" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.8)">
    Wholesale Products
  </text>

  <text x="750" y="480" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white">
