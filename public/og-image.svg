  </text>
  <text x="60" y="320" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" width="1080">
    Online in India
  </text>

  <!-- Subheading -->
  <text x="60" y="400" font-family="Arial, sans-serif" font-size="32" fill="rgba(255,255,255,0.9)">
    Connect with 10K+ verified wholesalers • 120+ cities in India • 100K+ products
  </text>

  <!-- CTA button background -->
  <rect x="60" y="480" width="280" height="80" rx="12" fill="white"/>

  <!-- CTA text -->
  <text x="200" y="535" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#6366f1" text-anchor="middle">
    Download Free App
  </text>

  <!-- Right side stats -->
  <text x="750" y="200" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">
